<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Face + Object Detection Demo</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    header {
      text-align: center;
      background-color: #000;
      color: white;
      padding: 20px;
      font-size: 24px;
    }

    main {
      display: flex;
      height: calc(100vh - 80px);
    }

    #video-container {
      width: 75%;
      position: relative;
      background-color: black;
      overflow: hidden;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 0;
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    #info-container {
      width: 25%;
      padding: 20px;
      background-color: #f4f4f4;
      overflow-y: auto;
    }

    #log-output {
      color: green;
      font-size: 14px;
      white-space: pre-wrap;
    }

    button {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 10px;
      background-color: #000;
      color: white;
      border: none;
      font-size: 16px;
      cursor: pointer;
      z-index: 2;
    }
  </style>
</head>
<body>
  <header>Face + Object Detection Demo</header>
  <main>
    <div id="video-container">
      <video id="video" autoplay muted></video>
      <canvas id="overlay"></canvas>
      <button id="captureBtn">Capture Snapshot</button>
    </div>
    <div id="info-container">
      <h3>Detection Log</h3>
      <pre id="log-output"></pre>
    </div>
  </main>

  <!-- External libraries -->
  <!-- Load TensorFlow.js (face-api.js v0.x requires TFJS v2.x) -->
  <script defer src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@2.2.0/dist/tf.min.js"></script>
  <!-- Load face-api.js -->
  <script defer src="../face_detection/face-api.min.js"></script>
  <!-- Load the COCO-SSD model -->
  <script defer src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
  <!-- Your application logic -->
  <script defer src="main.js"></script>

  <!-- Console log to UI -->
  <script>
    const originalLog = console.log;
    console.log = function (...args) {
      originalLog.apply(console, args);
      const message = args.join(' ');
      if (!message.includes('Error') && !message.includes('main.js')) {
        const logOutput = document.getElementById('log-output');
        if (logOutput) {
          logOutput.innerText += message + '\n';
        }
      }
    };
  </script>
</body>
</html>
