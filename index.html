<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Face Recognition</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    header {
      text-align: center;
      background-color: #3498db;
      color: white;
      padding: 20px;
      font-size: 24px;
    }

    main {
      display: flex;
      height: calc(100vh - 80px); /* Adjust for header height */
    }

    #video-container {
      width: 75%; /* 3/4 of the screen */
      position: relative;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      width: 100%;
      height: 100%;
    }

    #info-container {
      width: 25%; /* 1/4 of the screen */
      padding: 20px;
      background-color: #f4f4f4;
      overflow-y: auto;
    }

    button {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 10px;
      background-color: #3498db;
      color: white;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <header>
    Face Recognition Project
  </header>

  <main>
    <div id="video-container">
      <video id="video" autoplay muted></video>
      <canvas id="overlay"></canvas>
      <button id="captureBtn">Capture Snapshot</button>
    </div>
    <div id="info-container">
      <h3>Detected Object Info:</h3>
      <p id="object-info">No object detected yet.</p>
    </div>
  </main>

  <script defer src="face-api.min.js"></script>
  <script defer src="main.js"></script>
</body>
</html>
